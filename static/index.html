<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amanda</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #1a1a1a;
      user-select: none;
    }
    #app {
      display: none;
      flex-direction: column;
      height: 100vh;
      align-items: center;
      max-width: 480px;
      margin: 0 auto;
      background: #f0ece4;
    }
    #app.ready {
      display: flex;
      animation: fadeIn 0.5s ease-out;
    }

    /* Splash screen */
    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 20px;
    }
    .splash.hidden {
      opacity: 0;
      transform: scale(1.05);
      transition: all 0.6s ease-out;
      pointer-events: none;
    }
    .splash-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      animation: pulse-splash 2s ease-in-out infinite;
    }
    .splash-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .splash-text {
      font-size: 15px;
      color: #8a7e72;
      letter-spacing: 0.03em;
    }
    .splash-name {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
      margin-top: -8px;
    }
    .splash-dots {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }
    .splash-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #b8a88a;
    }
    .splash-dot:nth-child(1) { animation: bounce 1.2s ease-in-out 0s infinite; }
    .splash-dot:nth-child(2) { animation: bounce 1.2s ease-in-out 0.2s infinite; }
    .splash-dot:nth-child(3) { animation: bounce 1.2s ease-in-out 0.4s infinite; }

    @keyframes pulse-splash {
      0%, 100% { box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
      50% { box-shadow: 0 4px 32px rgba(0,0,0,0.18); }
    }

    /* Avatar area — ocupa todo espaço disponível */
    .avatar-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      position: relative;
      width: 100%;
      overflow: hidden;
      background: #f0ece4;
      -webkit-app-region: drag;
    }

    /* Container de vídeos/imagens — todos empilhados, crossfade via opacity */
    .avatar-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    .avatar-layer.active {
      opacity: 1;
    }
    .avatar-layer.entering {
      animation: character-enter 0.8s ease-out forwards;
    }

    /* Fallback pra imagem quando não tem vídeo */
    .avatar-fallback {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .avatar-fallback.active {
      opacity: 1;
    }

    @keyframes character-enter {
      0% { opacity: 0; transform: scale(0.95) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Speaking indicator */
    .speaking-indicator {
      display: none;
      position: absolute;
      top: 16px;
      right: 16px;
      align-items: center;
      gap: 3px;
      padding: 5px 12px;
      background: rgba(255,255,255,0.9);
      border-radius: 14px;
      font-size: 11px;
      color: #6bab72;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      z-index: 10;
      -webkit-app-region: no-drag;
    }
    .speaking-indicator.active { display: flex; }
    .speaking-bar { width: 3px; height: 10px; background: #6bab72; border-radius: 2px; }
    .speaking-bar:nth-child(1) { animation: speakBar 0.8s ease-in-out 0s infinite; }
    .speaking-bar:nth-child(2) { animation: speakBar 0.8s ease-in-out 0.15s infinite; }
    .speaking-bar:nth-child(3) { animation: speakBar 0.8s ease-in-out 0.3s infinite; }
    .speaking-bar:nth-child(4) { animation: speakBar 0.8s ease-in-out 0.45s infinite; }

    /* Message area — altura fixa pra não afetar a imagem */
    .message-area {
      width: 100%;
      padding: 10px 16px;
      background: #fff;
      border-top: 1px solid #e5e0d8;
      flex-shrink: 0;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .last-message {
      width: 100%;
      text-align: center;
      overflow-y: auto;
      max-height: 50px;
    }
    .last-message-bubble {
      display: inline-block;
      max-width: 95%;
      padding: 8px 14px;
      background: #f5f2ed;
      border-radius: 14px;
      font-size: 13.5px;
      line-height: 1.5;
      color: #1a1a1a;
      animation: fadeIn 0.3s ease-out;
    }
    .last-message-bubble.user-msg {
      background: #d9f0d4;
    }

    /* Typing dots inside bubble */
    .typing-bubble {
      display: inline-flex;
      gap: 5px;
      padding: 10px 18px;
      background: #f5f2ed;
      border-radius: 14px;
    }
    .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: #b0b8c1; }
    .typing-dot:nth-child(1) { animation: bounce 1.2s ease-in-out 0s infinite; }
    .typing-dot:nth-child(2) { animation: bounce 1.2s ease-in-out 0.15s infinite; }
    .typing-dot:nth-child(3) { animation: bounce 1.2s ease-in-out 0.3s infinite; }

    /* Input */
    .input-area {
      width: 100%;
      padding: 10px 14px 14px;
      background: #fff;
      border-top: 1px solid #e5e0d8;
      flex-shrink: 0;
    }
    .input-row { display: flex; gap: 8px; align-items: center; }
    .input-field {
      flex: 1; padding: 10px 14px; border-radius: 20px;
      border: 1.5px solid #ddd6cc; background: #faf8f4;
      color: #1a1a1a; font-size: 13.5px; font-family: inherit;
      outline: none; transition: border-color 0.2s;
      -webkit-app-region: no-drag;
    }
    .input-field:focus { border-color: #b8a88a; }
    .input-field::placeholder { color: #b0a898; }
    .photo-input { display: none; }

    .btn {
      width: 36px; height: 36px; border-radius: 50%; border: none;
      color: #fff; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0;
      -webkit-app-region: no-drag;
    }
    .send-btn { background: #ddd6cc; cursor: default; }
    .send-btn.active { background: #6bab72; cursor: pointer; box-shadow: 0 2px 8px rgba(107,171,114,0.25); }
    .mic-btn { background: #6bab72; }
    .photo-btn { background: #b8a88a; }
    .photo-btn:hover { background: #a89878; }
    .mic-btn:hover { background: #5a9a62; }
    .mic-btn.recording { background: #e85a5a; animation: pulse-mic 1.5s ease-in-out infinite; }
    .mic-btn.processing { background: #e8915a; cursor: wait; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-mic {
      0%, 100% { box-shadow: 0 0 0 0 rgba(232,90,90,0.4); }
      50% { box-shadow: 0 0 0 10px rgba(232,90,90,0); }
    }
    @keyframes speakBar {
      0%, 100% { height: 4px; }
      50% { height: 14px; }
    }
  </style>
</head>
<body>

<!-- Splash Screen -->
<div class="splash" id="splash">
  <div class="splash-avatar">
    <img src="/static/profile.png">
  </div>
  <div class="splash-name">Amanda</div>
  <div class="splash-text">conectando</div>
  <div class="splash-dots">
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
  </div>
</div>

<div id="app">
  <div class="avatar-area" id="avatarArea">
    <!-- Vídeos/imagens são inseridos aqui dinamicamente pelo preload -->

    <div class="speaking-indicator" id="speakingIndicator">
      <div class="speaking-bar"></div>
      <div class="speaking-bar"></div>
      <div class="speaking-bar"></div>
      <div class="speaking-bar"></div>
      falando
    </div>
  </div>

  <div class="message-area">
    <div class="last-message" id="lastMessage">
      <div class="last-message-bubble">conectando...</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <input class="input-field" id="input" placeholder="Fala comigo..." autocomplete="off">
      <input type="file" class="photo-input" id="photoInput" accept="image/*">
      <button class="btn photo-btn" id="photoBtn" title="Enviar foto">📷</button>
      <button class="btn mic-btn" id="micBtn" title="Segurar pra falar">🎤</button>
      <button class="btn send-btn" id="sendBtn">↑</button>
    </div>
  </div>
</div>

<script>
  // ══════════════════════════════════════════
  // Estado
  // ══════════════════════════════════════════
  let messages = [
    { role: "assistant", content: "conectando..." }
  ];
  let loading = false;
  let recording = false;
  let mediaRecorder = null;
  let audioChunks = [];
  let currentAudio = null;
  let currentEmotion = 'neutral';

  // Preload: guarda referências dos vídeos/imagens carregados
  const mediaLayers = {};  // { emotion: <video> ou <img> element }
  let preloaded = false;

  const avatarArea = document.getElementById('avatarArea');
  const lastMessageEl = document.getElementById('lastMessage');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const micBtn = document.getElementById('micBtn');
  const photoBtn = document.getElementById('photoBtn');
  const photoInput = document.getElementById('photoInput');
  const speakingIndicator = document.getElementById('speakingIndicator');

  // Timer pra voltar ao neutral
  let emotionTimer = null;

  // ══════════════════════════════════════════
  // Preload — carrega todos os vídeos/imagens na inicialização
  // ══════════════════════════════════════════
  async function preloadExpressions() {
    try {
      const res = await fetch('/api/expressions');
      const data = await res.json();
      const expressions = data.expressions;

      for (const [emotion, media] of Object.entries(expressions)) {
        if (media.video) {
          const video = document.createElement('video');
          video.className = 'avatar-layer';
          video.muted = true;
          video.playsInline = true;
          video.preload = 'auto';
          video.src = media.video;

          // neutral e neutral_speaking fazem loop, emoções tocam uma vez
          if (emotion === 'neutral' || emotion === 'neutral_speaking') {
            video.autoplay = (emotion === 'neutral');
            video.loop = true;
          } else {
            video.autoplay = false;
            video.loop = false;
            // NÃO adiciona ended handler aqui — quem controla é o handleResponse
            // Se não tiver áudio pendente, o scheduleNeutral cuida de voltar
          }

          video.load();
          avatarArea.insertBefore(video, speakingIndicator);
          mediaLayers[emotion] = video;
        } else if (media.image) {
          const img = document.createElement('img');
          img.className = 'avatar-layer';
          img.src = media.image;
          avatarArea.insertBefore(img, speakingIndicator);
          mediaLayers[emotion] = img;
        }
      }

      preloaded = true;
      console.log('✅ Preload concluído:', Object.keys(mediaLayers).join(', '));
    } catch (err) {
      console.warn('⚠️ Preload falhou, usando fallback:', err);
    }
  }

  // ══════════════════════════════════════════
  // Crossfade — troca de expressão sem pausa
  // ══════════════════════════════════════════
  function switchEmotion(emotion) {
    if (emotion === currentEmotion) return true;

    // Se tá falando e tentam trocar pra neutral, ignora
    // (neutral_speaking fica até o áudio terminar)
    if (isSpeaking && emotion === 'neutral') return true;

    // Cancela timer anterior
    if (emotionTimer) {
      clearTimeout(emotionTimer);
      emotionTimer = null;
    }

    // Se tem preload, usa crossfade
    if (preloaded && mediaLayers[emotion]) {
      // Esconde todos
      Object.values(mediaLayers).forEach(el => el.classList.remove('active'));
      
      const el = mediaLayers[emotion];
      el.classList.add('active');

      // Se é vídeo de emoção (não neutral), rebobina e toca do início
      if (el.play && emotion !== 'neutral') {
        el.currentTime = 0;
        el.play().catch(() => {});
      }
      // Se é neutral, garante que tá tocando
      if (el.play && emotion === 'neutral') {
        el.play().catch(() => {});
      }

      currentEmotion = emotion;
      return true;
    }

    return false;
  }

  function setExpression(imagePath) {
    // Extrai o nome da emoção do path
    // Ex: /static/roleplay/main/happy.mp4 → happy
    // Ex: /static/roleplay/main/main_happy.png → happy
    const filename = imagePath.split('/').pop().split('.')[0];
    const parts = filename.split('_');
    // Se o nome tem prefixo (main_happy), pega a última parte
    const emotion = parts.length > 1 ? parts.slice(1).join('_') : parts[0];

    if (switchEmotion(emotion)) return;

    // Fallback: cria elemento on-the-fly se não tiver preload
    const ext = imagePath.split('.').pop().toLowerCase();
    if (ext === 'mp4' || ext === 'webm') {
      const video = document.createElement('video');
      video.className = 'avatar-layer active';
      video.autoplay = true;
      video.loop = (emotion === 'neutral');
      video.muted = true;
      video.playsInline = true;
      video.src = imagePath;
      if (emotion !== 'neutral') {
        video.addEventListener('ended', () => switchEmotion('neutral'));
      }
      Object.values(mediaLayers).forEach(el => el.classList.remove('active'));
      avatarArea.insertBefore(video, speakingIndicator);
      mediaLayers[emotion] = video;
    } else {
      // Fallback imagem
      Object.values(mediaLayers).forEach(el => el.classList.remove('active'));
      const img = document.createElement('img');
      img.className = 'avatar-layer active';
      img.src = imagePath;
      avatarArea.insertBefore(img, speakingIndicator);
      mediaLayers[emotion] = img;
    }
    currentEmotion = emotion;
  }

  function setEmotion(emotion) {
    // Tenta preload primeiro (instantâneo)
    if (switchEmotion(emotion)) return;

    // Senão, busca o path do backend
    fetch('/api/environment?emotion=' + emotion)
      .then(r => r.json())
      .then(d => {
        if (d.image) setExpression(d.image);
      })
      .catch(() => {
        console.warn('Falha ao buscar expressão:', emotion);
      });
  }

  // Volta ao neutral depois de X segundos (usado só pra imagens sem vídeo)
  function scheduleNeutral(delay) {
    // Se a emoção atual é um vídeo, o evento 'ended' já cuida
    if (preloaded && mediaLayers[currentEmotion] && mediaLayers[currentEmotion].tagName === 'VIDEO' && currentEmotion !== 'neutral') {
      return; // vídeo volta sozinho
    }
    if (emotionTimer) clearTimeout(emotionTimer);
    emotionTimer = setTimeout(() => {
      switchEmotion('neutral');
    }, delay || 5000);
  }

  // ══════════════════════════════════════════
  // UI helpers
  // ══════════════════════════════════════════
  function showLastMessage(text, isUser) {
    if (loading && !text) {
      lastMessageEl.innerHTML = '<div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
    } else {
      const cls = isUser ? 'last-message-bubble user-msg' : 'last-message-bubble';
      lastMessageEl.innerHTML = '<div class="' + cls + '">' + escapeHtml(text) + '</div>';
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function base64ToBlob(b64, type) {
    const bytes = atob(b64);
    const arr = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    return new Blob([arr], { type });
  }

  // ══════════════════════════════════════════
  // Lip Sync — Web Audio API (fallback sem neutral_speaking)
  // ══════════════════════════════════════════
  const mouthOverlay = document.getElementById('mouthOverlay');
  const mouthSprites = {
    A: document.getElementById('mouthA'),
    B: document.getElementById('mouthB'),
    C: document.getElementById('mouthC'),
    D: document.getElementById('mouthD'),
  };
  let audioContext = null;
  let lipSyncAnimFrame = null;

  function setMouth(shape) {
    Object.values(mouthSprites).forEach(s => s.classList.remove('active'));
    if (mouthSprites[shape]) mouthSprites[shape].classList.add('active');
  }

  function startLipSyncOverlay(analyser) {
    const dataArray = new Uint8Array(analyser.frequencyBinCount);
    let lastShape = 'A';
    let frameCount = 0;
    mouthOverlay.classList.add('active');

    function animate() {
      analyser.getByteFrequencyData(dataArray);
      let sum = 0;
      for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
      const avg = sum / dataArray.length;

      let lowSum = 0, highSum = 0;
      const mid = Math.floor(dataArray.length / 3);
      for (let i = 0; i < mid; i++) lowSum += dataArray[i];
      for (let i = mid; i < dataArray.length; i++) highSum += dataArray[i];
      const lowAvg = lowSum / mid;
      const highAvg = highSum / (dataArray.length - mid);

      let shape = 'A';
      if (avg < 15) shape = 'A';
      else if (avg < 40) shape = 'B';
      else if (avg >= 40 && lowAvg > highAvg * 1.3) shape = 'D';
      else if (avg >= 40) shape = 'C';

      frameCount++;
      if (frameCount % 2 === 0 || shape !== lastShape) {
        setMouth(shape);
        lastShape = shape;
      }
      lipSyncAnimFrame = requestAnimationFrame(animate);
    }
    animate();
  }

  function stopLipSyncOverlay() {
    if (lipSyncAnimFrame) {
      cancelAnimationFrame(lipSyncAnimFrame);
      lipSyncAnimFrame = null;
    }
    setMouth('A');
    mouthOverlay.classList.remove('active');
  }

  // ══════════════════════════════════════════
  // Speaking — neutral_speaking.mp4 ou overlay de boca
  // ══════════════════════════════════════════
  let isSpeaking = false;
  let usingSpeakingVideo = false;

  function startSpeaking(analyser) {
    if (isSpeaking) return;
    isSpeaking = true;
    speakingIndicator.classList.add('active');

    // Prioridade: neutral_speaking.mp4
    if (mediaLayers['neutral_speaking']) {
      usingSpeakingVideo = true;
      Object.values(mediaLayers).forEach(el => el.classList.remove('active'));
      const el = mediaLayers['neutral_speaking'];
      el.currentTime = 0;
      el.classList.add('active');
      el.play().catch(() => {});
    } else if (analyser) {
      // Fallback: overlay de boca
      usingSpeakingVideo = false;
      startLipSyncOverlay(analyser);
    }
  }

  function stopSpeaking() {
    if (!isSpeaking) return;
    isSpeaking = false;
    speakingIndicator.classList.remove('active');

    if (usingSpeakingVideo) {
      switchEmotion('neutral');
    } else {
      stopLipSyncOverlay();
    }
  }

  function playAudio(base64Audio) {
    if (currentAudio) {
      currentAudio.pause();
      stopSpeaking();
    }

    const blob = base64ToBlob(base64Audio, 'audio/mp3');
    const url = URL.createObjectURL(blob);
    currentAudio = new Audio(url);

    // Prepara Web Audio só se não tem neutral_speaking (fallback)
    let analyser = null;
    if (!mediaLayers['neutral_speaking']) {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      const source = audioContext.createMediaElementSource(currentAudio);
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 256;
      analyser.smoothingTimeConstant = 0.3;
      source.connect(analyser);
      analyser.connect(audioContext.destination);
    }

    currentAudio.onended = () => {
      stopSpeaking();
      URL.revokeObjectURL(url);
      scheduleNeutral(2000);
    };

    currentAudio.play().then(() => {
      startSpeaking(analyser);
    }).catch(() => {
      stopSpeaking();
    });
  }

  // ══════════════════════════════════════════
  // Recording
  // ══════════════════════════════════════════
  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        sendVoice(new Blob(audioChunks, { type: 'audio/webm' }));
      };
      mediaRecorder.start();
      recording = true;
      micBtn.classList.add('recording');
    } catch (err) {
      alert('Não consegui acessar o microfone.');
    }
  }

  function stopRecording() {
    if (mediaRecorder && recording) {
      mediaRecorder.stop();
      recording = false;
      micBtn.classList.remove('recording');
    }
  }

  // ══════════════════════════════════════════
  // Envio de mensagens
  // ══════════════════════════════════════════

  /**
   * Coordena a resposta: emoção toca primeiro, depois áudio com neutral_speaking
   * Se não tem emoção diferente de neutral, vai direto pro áudio
   */
  function handleResponse(data) {
    showLastMessage(data.reply, false);

    const emotion = data.emotion || 'neutral';
    const hasAudio = !!data.audio;
    const hasEmotionVideo = emotion !== 'neutral' && mediaLayers[emotion] && mediaLayers[emotion].tagName === 'VIDEO';

    if (hasAudio && hasEmotionVideo) {
      // Emoção PRIMEIRO, depois áudio com neutral_speaking
      setEmotion(emotion);

      // Espera o vídeo da emoção terminar, depois toca o áudio
      const emotionVideo = mediaLayers[emotion];
      const onEnd = () => {
        emotionVideo.removeEventListener('ended', onEnd);
        playAudio(data.audio);
      };
      emotionVideo.addEventListener('ended', onEnd);

    } else if (hasAudio) {
      // Sem vídeo de emoção → áudio direto com neutral_speaking
      playAudio(data.audio);

    } else if (hasEmotionVideo) {
      // Sem áudio, com vídeo de emoção → toca e volta ao neutral
      setEmotion(emotion);
      const emotionVideo = mediaLayers[emotion];
      const onEnd = () => {
        emotionVideo.removeEventListener('ended', onEnd);
        switchEmotion('neutral');
      };
      emotionVideo.addEventListener('ended', onEnd);

    } else if (emotion !== 'neutral') {
      // Sem áudio, sem vídeo (só imagem) → emoção com timer
      setEmotion(emotion);
      scheduleNeutral(5000);
    }
  }

  async function sendVoice(audioBlob) {
    loading = true;
    micBtn.classList.add('processing');
    setEmotion('thinking');
    showLastMessage(null, false);

    const formData = new FormData();
    formData.append('audio', audioBlob, 'voice.webm');
    formData.append('history', JSON.stringify(messages));

    try {
      const res = await fetch('/api/voice', { method: 'POST', body: formData });
      const data = await res.json();
      if (data.user_text) messages.push({ role: "user", content: data.user_text });
      messages.push({ role: "assistant", content: data.reply });
      handleResponse(data);
    } catch (err) {
      const msg = "Ai, não consegui ouvir... tenta de novo?";
      messages.push({ role: "assistant", content: msg });
      showLastMessage(msg, false);
      setEmotion('sad');
      scheduleNeutral(4000);
    }

    loading = false;
    micBtn.classList.remove('processing');
    updateUI();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || loading) return;
    messages.push({ role: "user", content: text });
    inputEl.value = '';
    loading = true;
    setEmotion('thinking');
    showLastMessage(null, false);
    updateUI();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages })
      });
      const data = await res.json();
      messages.push({ role: "assistant", content: data.reply });
      handleResponse(data);
    } catch (err) {
      const msg = "Ai, deu um probleminha... tenta de novo?";
      messages.push({ role: "assistant", content: msg });
      showLastMessage(msg, false);
      setEmotion('sad');
      scheduleNeutral(4000);
    }

    loading = false;
    updateUI();
    inputEl.focus();
  }

  function updateUI() {
    const hasText = inputEl.value.trim().length > 0;
    sendBtn.className = 'btn send-btn' + (hasText && !loading ? ' active' : '');
  }

  // ══════════════════════════════════════════
  // Event listeners
  // ══════════════════════════════════════════
  inputEl.addEventListener('input', updateUI);
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
  sendBtn.addEventListener('click', sendMessage);
  micBtn.addEventListener('mousedown', e => { e.preventDefault(); startRecording(); });
  micBtn.addEventListener('mouseup', stopRecording);
  micBtn.addEventListener('mouseleave', () => { if (recording) stopRecording(); });
  micBtn.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); });
  micBtn.addEventListener('touchend', e => { e.preventDefault(); stopRecording(); });

  // Foto
  photoBtn.addEventListener('click', () => photoInput.click());
  photoInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file || loading) return;
    photoInput.value = '';
    await sendPhoto(file);
  });

  async function sendPhoto(file) {
    loading = true;
    const caption = inputEl.value.trim() || "";
    inputEl.value = '';
    setEmotion('thinking');
    showLastMessage(null, false);
    updateUI();

    messages.push({ role: "user", content: caption ? `[foto] ${caption}` : "[enviou uma foto]" });

    const formData = new FormData();
    formData.append('photo', file);
    formData.append('message', caption);
    formData.append('history', JSON.stringify(messages.slice(0, -1)));

    try {
      const res = await fetch('/api/image', { method: 'POST', body: formData });
      const data = await res.json();
      messages.push({ role: "assistant", content: data.reply });
      handleResponse(data);
    } catch (err) {
      const msg = "Ai, não consegui ver a foto... tenta de novo?";
      messages.push({ role: "assistant", content: msg });
      showLastMessage(msg, false);
      setEmotion('sad');
      scheduleNeutral(4000);
    }

    loading = false;
    updateUI();
    inputEl.focus();
  }

  updateUI();

  // ══════════════════════════════════════════
  // Inicialização — preload + greeting
  // ══════════════════════════════════════════
  async function loadGreeting() {
    const splash = document.getElementById('splash');
    const app = document.getElementById('app');

    // Preload das expressões em paralelo com o greeting
    const [greetingRes] = await Promise.allSettled([
      fetch('/api/greeting').then(r => r.json()),
      preloadExpressions(),
    ]);

    // Processa greeting
    let greetingData = null;
    if (greetingRes.status === 'fulfilled') {
      greetingData = greetingRes.value;
      messages[0] = { role: "assistant", content: greetingData.reply };
      showLastMessage(greetingData.reply, false);
    }

    // Transição splash → app
    splash.classList.add('hidden');
    setTimeout(() => {
      splash.style.display = 'none';
      app.classList.add('ready');

      // Mostra neutral com animação de entrada
      if (mediaLayers['neutral']) {
        mediaLayers['neutral'].classList.add('entering');
        mediaLayers['neutral'].classList.add('active');
        if (mediaLayers['neutral'].play) mediaLayers['neutral'].play().catch(() => {});
        setTimeout(() => mediaLayers['neutral'].classList.remove('entering'), 800);
      }

      // Greeting: se tem áudio, vai direto pro neutral_speaking
      if (greetingData) {
        if (greetingData.audio) {
          // Áudio tem prioridade — neutral_speaking direto
          setTimeout(() => playAudio(greetingData.audio), 800);
        } else if (greetingData.emotion && greetingData.emotion !== 'neutral') {
          // Sem áudio — só mostra a emoção
          setTimeout(() => {
            setEmotion(greetingData.emotion);
            scheduleNeutral(5000);
          }, 1000);
        }
      }

      inputEl.focus();
    }, 500);
  }

  loadGreeting();
</script>

</body>
