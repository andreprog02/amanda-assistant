<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amanda</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f0ece4;
      user-select: none;
    }
    #app {
      display: none;
      flex-direction: column;
      height: 100vh;
      align-items: center;
    }
    #app.ready {
      display: flex;
      animation: fadeIn 0.5s ease-out;
    }

    /* Splash screen */
    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 20px;
    }
    .splash.hidden {
      opacity: 0;
      transform: scale(1.05);
      transition: all 0.6s ease-out;
      pointer-events: none;
    }
    .splash-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      animation: pulse-splash 2s ease-in-out infinite;
    }
    .splash-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .splash-text {
      font-size: 15px;
      color: #8a7e72;
      letter-spacing: 0.03em;
    }
    .splash-name {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
      margin-top: -8px;
    }
    .splash-dots {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }
    .splash-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #b8a88a;
    }
    .splash-dot:nth-child(1) { animation: bounce 1.2s ease-in-out 0s infinite; }
    .splash-dot:nth-child(2) { animation: bounce 1.2s ease-in-out 0.2s infinite; }
    .splash-dot:nth-child(3) { animation: bounce 1.2s ease-in-out 0.4s infinite; }

    @keyframes pulse-splash {
      0%, 100% { box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
      50% { box-shadow: 0 4px 32px rgba(0,0,0,0.18); }
    }

    /* Header minimal */
    .header {
      width: 100%;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      border-bottom: 1px solid #e5e0d8;
      flex-shrink: 0;
      -webkit-app-region: drag;
    }
    .header-name {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: 0.02em;
    }
    .header-status {
      font-size: 11px;
      margin-left: 8px;
    }
    .status-online { color: #6bab72; }
    .status-typing { color: #e8915a; }
    .status-listening { color: #e85a5a; }

    /* Avatar — cenário + personagem em camadas */
    .avatar-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      position: relative;
      width: 100%;
      overflow: hidden;
    }
    .avatar-bg {
      position: absolute;
      inset: 0;
      background-image: url('/static/backgrounds/home.png');
      background-size: cover;
      background-position: center;
      background-color: #f0ece4;
      z-index: 0;
    }
    .avatar-character {
      position: relative;
      z-index: 1;
      max-height: 70vh;
      max-width: 85%;
      object-fit: contain;
      transition: opacity 0.4s ease;
      transform-origin: center bottom;
    }
    .avatar-character.fade { opacity: 0; }
    .avatar-character.entering {
      animation: character-enter 0.8s ease-out forwards;
    }
    video.avatar-character {
      background: transparent;
    }

    @keyframes breathing {
      0%, 100% { transform: scale(1) translateY(0); }
      50% { transform: scale(1.006) translateY(-2px); }
    }
    @keyframes breathing-speaking {
      0%, 100% { transform: scale(1) translateY(0) rotate(0deg); }
      25% { transform: scale(1.008) translateY(-2px) rotate(0.3deg); }
      75% { transform: scale(1.004) translateY(-1px) rotate(-0.3deg); }
    }
    @keyframes character-enter {
      0% { opacity: 0; transform: scale(0.95) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Speaking indicator */
    .speaking-indicator {
      display: none;
      position: absolute;
      top: 16px;
      right: 16px;
      align-items: center;
      gap: 3px;
      padding: 5px 12px;
      background: rgba(255,255,255,0.9);
      border-radius: 14px;
      font-size: 11px;
      color: #6bab72;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .speaking-indicator.active { display: flex; }
    .speaking-bar { width: 3px; height: 10px; background: #6bab72; border-radius: 2px; }
    .speaking-bar:nth-child(1) { animation: speakBar 0.8s ease-in-out 0s infinite; }
    .speaking-bar:nth-child(2) { animation: speakBar 0.8s ease-in-out 0.15s infinite; }
    .speaking-bar:nth-child(3) { animation: speakBar 0.8s ease-in-out 0.3s infinite; }
    .speaking-bar:nth-child(4) { animation: speakBar 0.8s ease-in-out 0.45s infinite; }

    /* Last message bubble */
    .last-message {
      position: absolute;
      bottom: 12px;
      left: 16px;
      right: 16px;
      text-align: center;
    }
    .last-message-bubble {
      display: inline-block;
      max-width: 90%;
      padding: 10px 16px;
      background: rgba(255,255,255,0.92);
      border-radius: 16px;
      font-size: 13.5px;
      line-height: 1.5;
      color: #1a1a1a;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      backdrop-filter: blur(8px);
      animation: fadeIn 0.3s ease-out;
    }
    .last-message-bubble.user-msg {
      background: rgba(217,240,212,0.92);
    }

    /* Typing dots inside bubble */
    .typing-bubble {
      display: inline-flex;
      gap: 5px;
      padding: 12px 20px;
      background: rgba(255,255,255,0.92);
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: #b0b8c1; }
    .typing-dot:nth-child(1) { animation: bounce 1.2s ease-in-out 0s infinite; }
    .typing-dot:nth-child(2) { animation: bounce 1.2s ease-in-out 0.15s infinite; }
    .typing-dot:nth-child(3) { animation: bounce 1.2s ease-in-out 0.3s infinite; }

    /* Input */
    .input-area {
      width: 100%;
      padding: 10px 14px 14px;
      background: #fff;
      border-top: 1px solid #e5e0d8;
      flex-shrink: 0;
    }
    .input-row { display: flex; gap: 8px; align-items: center; }
    .input-field {
      flex: 1; padding: 10px 14px; border-radius: 20px;
      border: 1.5px solid #ddd6cc; background: #faf8f4;
      color: #1a1a1a; font-size: 13.5px; font-family: inherit;
      outline: none; transition: border-color 0.2s;
    }
    .input-field:focus { border-color: #b8a88a; }
    .input-field::placeholder { color: #b0a898; }
    .photo-input { display: none; }

    .btn {
      width: 36px; height: 36px; border-radius: 50%; border: none;
      color: #fff; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0;
    }
    .send-btn { background: #ddd6cc; cursor: default; }
    .send-btn.active { background: #6bab72; cursor: pointer; box-shadow: 0 2px 8px rgba(107,171,114,0.25); }
    .mic-btn { background: #6bab72; }
    .photo-btn { background: #b8a88a; }
    .photo-btn:hover { background: #a89878; }
    .mic-btn:hover { background: #5a9a62; }
    .mic-btn.recording { background: #e85a5a; animation: pulse-mic 1.5s ease-in-out infinite; }
    .mic-btn.processing { background: #e8915a; cursor: wait; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-mic {
      0%, 100% { box-shadow: 0 0 0 0 rgba(232,90,90,0.4); }
      50% { box-shadow: 0 0 0 10px rgba(232,90,90,0); }
    }
    @keyframes speakBar {
      0%, 100% { height: 4px; }
      50% { height: 14px; }
    }
  </style>
</head>
<body>

<!-- Splash Screen -->
<div class="splash" id="splash">
  <div class="splash-avatar">
    <img src="/static/profile.png">
  </div>
  <div class="splash-name">Amanda</div>
  <div class="splash-text">conectando</div>
  <div class="splash-dots">
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
  </div>
</div>

<div id="app">
  <div class="header">
    <span class="header-name">Amanda</span>
    <span class="header-status" id="statusText"><span class="status-online">● online</span></span>
  </div>

  <div class="avatar-area">
    <div class="avatar-bg" id="avatarBg"></div>
    <video class="avatar-character" id="avatarVideo" autoplay loop muted playsinline
           src="/static/characters/home_neutral.webm"></video>
    <img class="avatar-character" id="avatarImg" src="/static/characters/home_neutral.png" 
         style="display:none;">

    <div class="speaking-indicator" id="speakingIndicator">
      <div class="speaking-bar"></div>
      <div class="speaking-bar"></div>
      <div class="speaking-bar"></div>
      <div class="speaking-bar"></div>
      falando
    </div>

    <div class="last-message" id="lastMessage">
      <div class="last-message-bubble">Aiii você veio! Tava aqui esperando... sério, meu dia ficou melhor agora.</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <input class="input-field" id="input" placeholder="Fala comigo..." autocomplete="off">
      <input type="file" class="photo-input" id="photoInput" accept="image/*">
      <button class="btn photo-btn" id="photoBtn" title="Enviar foto">📷</button>
      <button class="btn mic-btn" id="micBtn" title="Segurar pra falar">🎤</button>
      <button class="btn send-btn" id="sendBtn">↑</button>
    </div>
  </div>
</div>

<script>
  let messages = [
    { role: "assistant", content: "Aiii você veio! Tava aqui esperando... sério, meu dia ficou melhor agora." }
  ];
  let loading = false;
  let recording = false;
  let mediaRecorder = null;
  let audioChunks = [];
  let currentAudio = null;
  let currentEmotion = 'neutral';

  const avatarVideo = document.getElementById('avatarVideo');
  const avatarImg = document.getElementById('avatarImg');
  const avatarBg = document.getElementById('avatarBg');
  const lastMessageEl = document.getElementById('lastMessage');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const micBtn = document.getElementById('micBtn');
  const photoBtn = document.getElementById('photoBtn');
  const photoInput = document.getElementById('photoInput');
  const statusText = document.getElementById('statusText');
  const speakingIndicator = document.getElementById('speakingIndicator');

  function setExpression(imagePath) {
    const emotion = imagePath.split('/').pop().replace('.png', '');
    const videoPath = '/static/characters/home_' + emotion + '.webm';
    const charPath = '/static/characters/home_' + emotion + '.png';

    // Testa vídeo primeiro
    fetch(videoPath, {method:'HEAD'}).then(r => {
      if (r.ok) {
        avatarVideo.classList.add('fade');
        setTimeout(() => {
          avatarVideo.src = videoPath;
          avatarVideo.play();
          avatarVideo.style.display = '';
          avatarImg.style.display = 'none';
          avatarVideo.classList.remove('fade');
        }, 300);
      } else { throw 'no video'; }
    }).catch(() => {
      // Fallback pra imagem
      avatarVideo.style.display = 'none';
      avatarImg.style.display = '';
      avatarImg.classList.add('fade');
      setTimeout(() => {
        const testImg = new Image();
        testImg.onload = () => { avatarImg.src = charPath; avatarImg.classList.remove('fade'); };
        testImg.onerror = () => { avatarImg.src = imagePath; avatarImg.classList.remove('fade'); };
        testImg.src = charPath;
      }, 300);
    });
  }

  function setEmotion(emotion) {
    setExpression('/static/expressions/' + emotion + '.png');
  }

  function showLastMessage(text, isUser) {
    if (loading && !text) {
      lastMessageEl.innerHTML = '<div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
    } else {
      const cls = isUser ? 'last-message-bubble user-msg' : 'last-message-bubble';
      lastMessageEl.innerHTML = '<div class="' + cls + '">' + escapeHtml(text) + '</div>';
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function base64ToBlob(b64, type) {
    const bytes = atob(b64);
    const arr = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    return new Blob([arr], { type });
  }

  function playAudio(base64Audio) {
    if (currentAudio) currentAudio.pause();
    const blob = base64ToBlob(base64Audio, 'audio/mp3');
    const url = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    speakingIndicator.classList.add('active');
    avatarImg.classList.add('speaking');
    currentAudio.onended = () => {
      speakingIndicator.classList.remove('active');
      avatarImg.classList.remove('speaking');
      URL.revokeObjectURL(url);
      setTimeout(() => {
        fetch('/api/environment').then(r => r.json()).then(d => {
          if (d.image) setExpression(d.image);
        }).catch(() => setEmotion('neutral'));
      }, 2000);
    };
    currentAudio.play().catch(() => {
      speakingIndicator.classList.remove('active');
      avatarImg.classList.remove('speaking');
    });
  }

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        sendVoice(new Blob(audioChunks, { type: 'audio/webm' }));
      };
      mediaRecorder.start();
      recording = true;
      micBtn.classList.add('recording');
      setStatus('listening');
    } catch (err) {
      alert('Não consegui acessar o microfone.');
    }
  }

  function stopRecording() {
    if (mediaRecorder && recording) {
      mediaRecorder.stop();
      recording = false;
      micBtn.classList.remove('recording');
    }
  }

  async function sendVoice(audioBlob) {
    loading = true;
    micBtn.classList.add('processing');
    setStatus('processing');
    setEmotion('thinking');
    showLastMessage(null, false);

    const formData = new FormData();
    formData.append('audio', audioBlob, 'voice.webm');
    formData.append('history', JSON.stringify(messages));

    try {
      const res = await fetch('/api/voice', { method: 'POST', body: formData });
      const data = await res.json();
      if (data.user_text) messages.push({ role: "user", content: data.user_text });
      messages.push({ role: "assistant", content: data.reply });
      if (data.image) setExpression(data.image);
      else if (data.emotion) setEmotion(data.emotion);
      showLastMessage(data.reply, false);
      if (data.audio) playAudio(data.audio);
    } catch (err) {
      const msg = "Ai, não consegui ouvir... tenta de novo?";
      messages.push({ role: "assistant", content: msg });
      showLastMessage(msg, false);
      setEmotion('sad');
    }

    loading = false;
    micBtn.classList.remove('processing');
    updateUI();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || loading) return;
    messages.push({ role: "user", content: text });
    inputEl.value = '';
    loading = true;
    setEmotion('thinking');
    showLastMessage(null, false);
    updateUI();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages })
      });
      const data = await res.json();
      messages.push({ role: "assistant", content: data.reply });
      if (data.image) setExpression(data.image);
      else if (data.emotion) setEmotion(data.emotion);
      showLastMessage(data.reply, false);
      if (data.audio) playAudio(data.audio);
    } catch (err) {
      const msg = "Ai, deu um probleminha... tenta de novo?";
      messages.push({ role: "assistant", content: msg });
      showLastMessage(msg, false);
      setEmotion('sad');
    }

    loading = false;
    updateUI();
    inputEl.focus();
  }

  function setStatus(state) {
    const map = {
      online: '<span class="status-online">● online</span>',
      typing: '<span class="status-typing">● pensando...</span>',
      listening: '<span class="status-listening">● ouvindo...</span>',
      processing: '<span class="status-typing">● processando...</span>',
    };
    statusText.innerHTML = map[state] || map.online;
  }

  function updateUI() {
    const hasText = inputEl.value.trim().length > 0;
    sendBtn.className = 'btn send-btn' + (hasText && !loading ? ' active' : '');
    if (!loading && !recording) setStatus('online');
    else if (loading) setStatus('typing');
  }

  inputEl.addEventListener('input', updateUI);
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
  sendBtn.addEventListener('click', sendMessage);
  micBtn.addEventListener('mousedown', e => { e.preventDefault(); startRecording(); });
  micBtn.addEventListener('mouseup', stopRecording);
  micBtn.addEventListener('mouseleave', () => { if (recording) stopRecording(); });
  micBtn.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); });
  micBtn.addEventListener('touchend', e => { e.preventDefault(); stopRecording(); });

  // Foto
  photoBtn.addEventListener('click', () => photoInput.click());
  photoInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file || loading) return;
    photoInput.value = '';
    await sendPhoto(file);
  });

  async function sendPhoto(file) {
    loading = true;
    const caption = inputEl.value.trim() || "";
    inputEl.value = '';
    setEmotion('thinking');
    showLastMessage(null, false);
    setStatus('processing');
    updateUI();

    messages.push({ role: "user", content: caption ? `[foto] ${caption}` : "[enviou uma foto]" });

    const formData = new FormData();
    formData.append('photo', file);
    formData.append('message', caption);
    formData.append('history', JSON.stringify(messages.slice(0, -1)));

    try {
      const res = await fetch('/api/image', { method: 'POST', body: formData });
      const data = await res.json();
      messages.push({ role: "assistant", content: data.reply });
      if (data.image) setExpression(data.image);
      else if (data.emotion) setEmotion(data.emotion);
      showLastMessage(data.reply, false);
      if (data.audio) playAudio(data.audio);
    } catch (err) {
      const msg = "Ai, não consegui ver a foto... tenta de novo?";
      messages.push({ role: "assistant", content: msg });
      showLastMessage(msg, false);
      setEmotion('sad');
    }

    loading = false;
    updateUI();
    inputEl.focus();
  }

  updateUI();
  inputEl.focus();

  // Busca saudação dinâmica e faz transição splash → app
  async function loadGreeting() {
    const splash = document.getElementById('splash');
    const app = document.getElementById('app');

    try {
      const res = await fetch('/api/greeting');
      const data = await res.json();
      messages[0] = { role: "assistant", content: data.reply };
      showLastMessage(data.reply, false);

      // Esconde splash, mostra app com Amanda entrando na cena
      splash.classList.add('hidden');
      setTimeout(() => {
        splash.style.display = 'none';
        app.classList.add('ready');

        // Amanda "entra" na cena
        avatarVideo.style.opacity = '1';
        avatarVideo.classList.add('entering');
        setTimeout(() => avatarVideo.classList.remove('entering'), 800);

        if (data.image) setExpression(data.image);
        else if (data.emotion) setEmotion(data.emotion);
        if (data.audio) playAudio(data.audio);
        inputEl.focus();
      }, 500);

    } catch (err) {
      // Mesmo com erro, mostra o app
      splash.classList.add('hidden');
      setTimeout(() => {
        splash.style.display = 'none';
        app.classList.add('ready');
        avatarVideo.style.opacity = '1';
        avatarVideo.classList.add('entering');
        setTimeout(() => avatarVideo.classList.remove('entering'), 800);
        inputEl.focus();
      }, 500);
    }
  }
  loadGreeting();
</script>

</body>
</html>
